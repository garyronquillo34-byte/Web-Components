<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

body {
  background: linear-gradient(135deg,#667eea,#764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  width: 100%;
  max-width: 350px;
  border-radius: 10px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
  padding: 30px;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  display: block;
  margin-top: 12px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border: none;
  background: #007BFF;
  color: white;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0056b3;
}

.links {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}

.links a {
  color: #007BFF;
  text-decoration: none;
  font-weight: bold;
}

.links a:hover {
  text-decoration: underline;
}

.forgot {
  text-align: right;
  margin-top: 5px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<form>
  <label>Email Address</label>
  <input type="email" placeholder="Enter your email">

  <label>Password</label>
  <input type="password" placeholder="Enter password">

  <div class="forgot">
    <a href="#">Forgot Password?</a>
  </div>

  <button type="button">Login</button>
</form>

<div class="links">
Don't have an account? 
<a href="register.html" target="_blank">Register</a>
</div>

</div>

</body>
</html>
